name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: cd website && npm ci

      - name: Build website
        run: cd website && npm run build
        env:
          NODE_ENV: production
          # FlashBankRouterV3 (hardened: capped owner cut, dual-sig + timelock, maxFee pin).
          # Live + verified on all chains 2026-06-09. v2.1 had zero committed liquidity, so the
          # UI cuts straight over to v3 with no provider migration needed.
          NEXT_PUBLIC_MAINNET_ROUTER_ADDRESS: '0x7791f3A7D82db7186f085BfFa3Fd46898EEaAE35'
          NEXT_PUBLIC_MAINNET_WETH_ADDRESS: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2'
          NEXT_PUBLIC_BASE_ROUTER_ADDRESS: '0xDd6D0dC7AA7Be44E4F44d15D34851f3eDc7610AA'
          NEXT_PUBLIC_BASE_WETH_ADDRESS: '0x4200000000000000000000000000000000000006'
          NEXT_PUBLIC_ARBITRUM_ROUTER_ADDRESS: '0x34DcDBCCf9cC5753F709723Fa00DDe7eCd549A17'
          NEXT_PUBLIC_ARBITRUM_WETH_ADDRESS: '0x82aF49447D8a07e3bd95BD0d56f35241523fBab1'
          # P2P term-loan escrow — live + verified on mainnets (Ownable, 0 bps introductory).
          NEXT_PUBLIC_MAINNET_P2P_LOAN_ADDRESS: '0x131C8545b28bca9063B364380956Df33A70018A0'
          NEXT_PUBLIC_BASE_P2P_LOAN_ADDRESS: '0x86FbF8e03f8A6f3eF52062E3f81627F64aa5FcbB'
          # Sepolia playground: v3 router with WETH + fpETH enabled (admin = deployer), WETH demo borrower.
          NEXT_PUBLIC_SEPOLIA_ROUTER_ADDRESS: '0x6770d3e75F45a2080973c0021F184AEFE6f5CA67'
          NEXT_PUBLIC_SEPOLIA_WETH_ADDRESS: '0xdd13E55209Fd76AfE204dBda4007C227904f0a81'
          NEXT_PUBLIC_SEPOLIA_DEMO_BORROWER_ADDRESS: '0x60aFe52EC2e786ed3d9dB519E6f3299DAc405272'
          NEXT_PUBLIC_SEPOLIA_PROOF_SINK_ADDRESS: '0x0cE5514Cf655ce859B1FdDb412FaFcb3Fb921169'
          NEXT_PUBLIC_SEPOLIA_DEMO_COUNTER_ADDRESS: '0x1E202CD9a97392f6E74F70dc29b5404A00eD8561'
          # Sepolia P2P playground escrow + freely-mintable faucet tokens (fpUSD/fpETH).
          NEXT_PUBLIC_SEPOLIA_P2P_LOAN_ADDRESS: '0x3Ce4B6DC383d3105A6D35a6816BC10D395Aa1017'
          NEXT_PUBLIC_SEPOLIA_FPUSD_ADDRESS: '0x4aBb056aA5aB39b55039ACAf795Ff9403Fa9760c'
          NEXT_PUBLIC_SEPOLIA_FPETH_ADDRESS: '0xB9CCa9CfE38e583CF1cf456F03946ac6376396F5'
          # Public WalletConnect Cloud project id (client-side identifier, shipped in the bundle).
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: '13a22e866a5b0099367588af6786a208'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
